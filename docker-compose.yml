services:
  postgres:
    image: postgres:16-alpine
    container_name: rocket-to-the-moon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rocket_to_the_moon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
